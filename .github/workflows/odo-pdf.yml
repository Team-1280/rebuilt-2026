name: Compile odo typst to pdf

on:
  push:
    paths:
      - "odometry/odometry.typ"
      - ".github/workflows/odo-pdf.yml"

jobs:
  compile_typst:
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v6

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Compile Typst to PDF
        run: typst compile odometry/odometry.typ odometry/odometry.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: odometry
          path: odometry/odometry.pdf
