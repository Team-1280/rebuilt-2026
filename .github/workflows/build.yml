# Copied from https://docs.wpilib.org/en/stable/docs/software/advanced-gradlerio/robot-code-ci.html
# This is a basic workflow to build robot code.

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the main branch.
# Ignore markdown files.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'trajectory/**'

  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'trajectory/**'

  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-dev-check
      cancel-in-progress: true

    # This grabs the WPILib docker container
    container: wpilib/roborio-cross-ubuntu:2023-22.04

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checkout your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Set up Git repository
        uses: actions/checkout@v6

      # Declare the repository safe and not under dubious ownership.
      - name: Add repository to git safe directories
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      # Grant execute permission for gradlew
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Check formatting
        run: ./gradlew spotlessJavaCheck

      # Run a single command using the runners shell
      - name: Compile and run tests on robot code
        run: ./gradlew build
